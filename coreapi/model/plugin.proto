syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Lifecycle state of a plugin.
enum PluginState {
  PLUGIN_STATE_UNSPECIFIED = 0;
  PLUGIN_STATE_WAITING = 1;
  PLUGIN_STATE_ACTIVE = 2;
}

// Visual theme of the plugin widget.
enum PluginAppearance {
  PLUGIN_APPEARANCE_UNSPECIFIED = 0;
  PLUGIN_APPEARANCE_LIGHT = 1;
  PLUGIN_APPEARANCE_DARK = 2;
  PLUGIN_APPEARANCE_SYSTEM = 3;
}

// Horizontal position of the plugin widget.
enum PluginPosition {
  PLUGIN_POSITION_UNSPECIFIED = 0;
  PLUGIN_POSITION_LEFT = 1;
  PLUGIN_POSITION_RIGHT = 2;
}

// Vertical position of the mobile chat bubble.
enum PluginBubblePosition {
  PLUGIN_BUBBLE_POSITION_UNSPECIFIED = 0;
  PLUGIN_BUBBLE_POSITION_TOP = 1;
  PLUGIN_BUBBLE_POSITION_BOTTOM = 2;
}

// Type of the plugin launcher button.
enum PluginButtonType {
  PLUGIN_BUTTON_TYPE_UNSPECIFIED = 0;
  PLUGIN_BUTTON_TYPE_LEGACY = 1;
  PLUGIN_BUTTON_TYPE_CUSTOM_IMAGE = 2;
  PLUGIN_BUTTON_TYPE_ICON_BUTTON = 3;
}

// Predefined icon for the plugin launcher button.
enum PluginIconButton {
  PLUGIN_ICON_BUTTON_UNSPECIFIED = 0;
  PLUGIN_ICON_BUTTON_CHANNEL = 1;
  PLUGIN_ICON_BUTTON_CHANNEL_FILLED = 2;
  PLUGIN_ICON_BUTTON_CHAT_BUBBLE_ALT = 3;
  PLUGIN_ICON_BUTTON_CHAT_BUBBLE_ALT_FILLED = 4;
  PLUGIN_ICON_BUTTON_CHAT_BUBBLE_FILLED = 5;
  PLUGIN_ICON_BUTTON_CHAT_LIGHTNING_FILLED = 6;
  PLUGIN_ICON_BUTTON_CHAT_PROGRESS = 7;
  PLUGIN_ICON_BUTTON_CHAT_PROGRESS_FILLED = 8;
  PLUGIN_ICON_BUTTON_CHAT_QUESTION = 9;
  PLUGIN_ICON_BUTTON_CHAT_QUESTION_FILLED = 10;
  PLUGIN_ICON_BUTTON_COMMENT = 11;
  PLUGIN_ICON_BUTTON_COMMENT_FILLED = 12;
  PLUGIN_ICON_BUTTON_COMMUNICATION = 13;
  PLUGIN_ICON_BUTTON_HEADSET = 14;
  PLUGIN_ICON_BUTTON_HELP_FILLED = 15;
  PLUGIN_ICON_BUTTON_SEND_FORWARD = 16;
  PLUGIN_ICON_BUTTON_SEND_FORWARD_FILLED = 17;
  PLUGIN_ICON_BUTTON_SMS = 18;
  PLUGIN_ICON_BUTTON_SMS_FILLED = 19;
}

// Plugin represents a channel's web chat widget configuration.
// Each channel has one plugin that controls the appearance and behavior
// of the embedded chat widget.
message Plugin {
  // Unique plugin identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this plugin belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string channel_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Plugin display name.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  string name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).required = true
  ];

  // Current lifecycle state.
  //
  // +kubebuilder:validation:Required
  PluginState state = 4 [(buf.validate.field).required = true];

  // Visual theme of the widget.
  //
  // +kubebuilder:validation:Required
  PluginAppearance appearance = 5 [(buf.validate.field).required = true];

  // Whether the label button is displayed on the widget.
  //
  // +kubebuilder:validation:Nullable
  bool label_button = 6;

  // Text displayed on the label button.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MinLength=4
  // +kubebuilder:validation:MaxLength=30
  string label_button_text = 7 [(buf.validate.field).cel = {
    id: "string.len"
    message: "value must be between 4 and 30 characters"
    expression: "this == '' || (size(this) >= 4 && size(this) <= 30)"
  }];

  // Internationalized label button text keyed by locale.
  // Each value must be between 4 and 30 characters.
  //
  // +kubebuilder:validation:Nullable
  map<string, string> label_button_text_i18n_map = 8;

  // Type of the launcher button.
  //
  // +kubebuilder:validation:Required
  PluginButtonType button_type = 9 [(buf.validate.field).required = true];

  // Predefined icon for the launcher button.
  // Applicable when button_type is PLUGIN_BUTTON_TYPE_ICON_BUTTON.
  //
  // +kubebuilder:validation:Nullable
  PluginIconButton icon_button = 10;

  // URL of the custom launcher button image.
  //
  // +kubebuilder:validation:Nullable
  string custom_image_url = 11;

  // URL of the desktop launcher button image.
  //
  // +kubebuilder:validation:Nullable
  string desk_image_url = 12;

  // Horizontal margin in pixels for the desktop widget.
  //
  // +kubebuilder:validation:Nullable
  int32 desk_margin_x = 13;

  // Vertical margin in pixels for the desktop widget.
  //
  // +kubebuilder:validation:Nullable
  int32 desk_margin_y = 14;

  // Whether the launcher button is hidden on desktop.
  //
  // +kubebuilder:validation:Nullable
  bool desk_hide_button = 15;

  // Horizontal position of the widget on desktop.
  //
  // +kubebuilder:validation:Nullable
  PluginPosition desk_position = 16;

  // URL of the mobile launcher button image.
  //
  // +kubebuilder:validation:Nullable
  string mobile_image_url = 17;

  // Horizontal margin in pixels for the mobile widget.
  //
  // +kubebuilder:validation:Nullable
  int32 mobile_margin_x = 18;

  // Vertical margin in pixels for the mobile widget.
  //
  // +kubebuilder:validation:Nullable
  int32 mobile_margin_y = 19;

  // Horizontal position of the widget on mobile.
  //
  // +kubebuilder:validation:Nullable
  PluginPosition mobile_position = 20;

  // Whether the launcher button is hidden on mobile.
  //
  // +kubebuilder:validation:Nullable
  bool mobile_hide_button = 21;

  // Vertical position of the chat bubble on mobile.
  //
  // +kubebuilder:validation:Nullable
  PluginBubblePosition mobile_bubble_position = 22;

  // Ratio of website visitors who see the plugin widget.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:Minimum=0
  // +kubebuilder:validation:Maximum=1
  float run_rate = 23 [
    (buf.validate.field).cel = {
      id: "float.gte"
      message: "value must be at least 0"
      expression: "this >= 0.0"
    },
    (buf.validate.field).cel = {
      id: "float.lte"
      message: "value must be at most 1"
      expression: "this <= 1.0"
    }
  ];

  // Facebook Pixel identifier for conversion tracking.
  //
  // +kubebuilder:validation:Nullable
  string facebook_pixel_id = 24;

  // Plugin creation timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp created_at = 25 [(buf.validate.field).required = true];
}
