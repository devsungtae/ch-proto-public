syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Content type of a message block.
enum BlockType {
  BLOCK_TYPE_UNSPECIFIED = 0;
  BLOCK_TYPE_TEXT = 1;
  BLOCK_TYPE_CODE = 2;
  BLOCK_TYPE_BULLETS = 3;
}

// Block represents a unit of structured content within a message.
// Text and code blocks are leaf nodes containing a value.
// Bullet blocks are container nodes containing child blocks.
message Block {
  // Content type of this block.
  //
  // +kubebuilder:validation:Required
  BlockType type = 1 [(buf.validate.field).required = true];

  // Programming language identifier for code blocks.
  //
  // +kubebuilder:validation:Nullable
  string language = 2;

  // Text content for leaf blocks (text, code).
  //
  // +kubebuilder:validation:Nullable
  string value = 3;

  // Child blocks for container blocks (bullets).
  //
  // +kubebuilder:validation:Nullable
  repeated Block blocks = 4;
}

// Visual color variant for message buttons.
enum ButtonColorVariant {
  BUTTON_COLOR_VARIANT_UNSPECIFIED = 0;
  BUTTON_COLOR_VARIANT_COBALT = 1;
  BUTTON_COLOR_VARIANT_GREEN = 2;
  BUTTON_COLOR_VARIANT_ORANGE = 3;
  BUTTON_COLOR_VARIANT_RED = 4;
  BUTTON_COLOR_VARIANT_BLACK = 5;
  BUTTON_COLOR_VARIANT_PINK = 6;
  BUTTON_COLOR_VARIANT_PURPLE = 7;
}

// MessageButton represents an interactive button attached to a message.
message MessageButton {
  // Button display text.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=30
  string title = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).required = true
  ];

  // Visual color variant of the button.
  //
  // +kubebuilder:validation:Nullable
  ButtonColorVariant color_variant = 2;

  // Action to perform when the button is clicked.
  // The structure depends on the action type (web, command, wam).
  //
  // +kubebuilder:validation:Required
  google.protobuf.Struct action = 3 [(buf.validate.field).required = true];
}

// MessageFile represents a file attachment in a message.
message MessageFile {
  // Unique file identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // File category such as image, video, or audio.
  //
  // +kubebuilder:validation:Nullable
  string type = 2;

  // Original file name.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // File size in bytes.
  //
  // +kubebuilder:validation:Required
  int64 size = 4 [(buf.validate.field).required = true];

  // MIME content type of the file.
  //
  // +kubebuilder:validation:Nullable
  string content_type = 5;

  // Duration in seconds for audio and video files.
  //
  // +kubebuilder:validation:Nullable
  double duration = 6;

  // Image or video width in pixels.
  //
  // +kubebuilder:validation:Nullable
  int32 width = 7;

  // Image or video height in pixels.
  //
  // +kubebuilder:validation:Nullable
  int32 height = 8;

  // EXIF orientation value for images.
  //
  // +kubebuilder:validation:Nullable
  int32 orientation = 9;

  // Whether the image is animated (e.g., GIF).
  //
  // +kubebuilder:validation:Nullable
  bool animated = 10;

  // Storage bucket name where the file is stored.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string bucket = 11 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Storage key identifying the file within the bucket.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string key = 12 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Storage key for the file preview thumbnail.
  //
  // +kubebuilder:validation:Nullable
  string preview_key = 13;
}

// MessageWebPage represents a web page link preview attached to a message.
message MessageWebPage {
  // Unique web page identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // URL of the web page.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string url = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Title of the web page.
  //
  // +kubebuilder:validation:Nullable
  string title = 3;

  // Short description of the web page content.
  //
  // +kubebuilder:validation:Nullable
  string description = 4;

  // URL of the preview image.
  //
  // +kubebuilder:validation:Nullable
  string image_url = 5;

  // URL of the preview video.
  //
  // +kubebuilder:validation:Nullable
  string video_url = 6;

  // Publisher name of the web page.
  //
  // +kubebuilder:validation:Nullable
  string publisher = 7;

  // Author name of the web page content.
  //
  // +kubebuilder:validation:Nullable
  string author = 8;

  // Preview image width in pixels.
  //
  // +kubebuilder:validation:Nullable
  int32 width = 9;

  // Preview image height in pixels.
  //
  // +kubebuilder:validation:Nullable
  int32 height = 10;

  // Storage bucket name for the cached preview image.
  //
  // +kubebuilder:validation:Nullable
  string bucket = 11;

  // Storage key for the cached preview image.
  //
  // +kubebuilder:validation:Nullable
  string preview_key = 12;

  // Logo URL of the web page publisher.
  //
  // +kubebuilder:validation:Nullable
  string logo = 13;

  // Site name of the web page.
  //
  // +kubebuilder:validation:Nullable
  string name = 14;
}

// Message option flags that modify message delivery and display behavior.
enum MessageOption {
  MESSAGE_OPTION_UNSPECIFIED = 0;
  MESSAGE_OPTION_ACT_AS_MANAGER = 1;
  MESSAGE_OPTION_DISPLAY_AS_CHANNEL = 2;
  MESSAGE_OPTION_DO_NOT_POST = 3;
  MESSAGE_OPTION_DO_NOT_SEARCH = 4;
  MESSAGE_OPTION_DO_NOT_SEND_APP = 5;
  MESSAGE_OPTION_DO_NOT_UPDATE_DESK = 6;
  MESSAGE_OPTION_IMMUTABLE = 7;
  MESSAGE_OPTION_PRIVATE = 8;
  MESSAGE_OPTION_SILENT = 9;
  MESSAGE_OPTION_SILENT_TO_MANAGER = 10;
  MESSAGE_OPTION_SILENT_TO_USER = 11;
  MESSAGE_OPTION_ALERT_TO_WRITER = 12;
}

// MessageContent represents the content of a message sent via the Open API.
message MessageContent {
  // Structured content blocks of the message.
  //
  // +kubebuilder:validation:Nullable
  repeated Block blocks = 1;

  // Plain text representation of the message.
  //
  // +kubebuilder:validation:Nullable
  string plain_text = 2;

  // Interactive buttons attached to the message.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxItems=2
  repeated MessageButton buttons = 3 [(buf.validate.field).repeated = {
    max_items: 2
  }];

  // File attachments included in the message.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxItems=10
  repeated MessageFile files = 4 [(buf.validate.field).repeated = {
    max_items: 10
  }];

  // Web page link preview attached to the message.
  //
  // +kubebuilder:validation:Nullable
  MessageWebPage web_page = 5;

  // Interactive form attached to the message.
  // The structure depends on the form type (custom, followUp, call).
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct form = 6;

  // Option flags that modify message delivery and display behavior.
  //
  // +kubebuilder:validation:Nullable
  repeated MessageOption options = 7;

  // Client-generated request identifier for idempotency.
  //
  // +kubebuilder:validation:Nullable
  string request_id = 8;
}
