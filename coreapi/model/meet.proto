syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/message_content.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Direction of a phone call relative to the channel.
enum CallDirection {
  CALL_DIRECTION_UNSPECIFIED = 0;
  CALL_DIRECTION_INBOUND = 1;
  CALL_DIRECTION_OUTBOUND = 2;
}

// Current state of a phone call.
enum CallState {
  CALL_STATE_UNSPECIFIED = 0;
  CALL_STATE_WAITING = 1;
  CALL_STATE_ENGAGED = 2;
}

// Reason why a call was missed without being answered.
enum MissedReason {
  MISSED_REASON_UNSPECIFIED = 0;
  MISSED_REASON_NOT_IN_OPERATION = 1;
  MISSED_REASON_USER_LEFT = 2;
  MISSED_REASON_RING_TIME_OVER = 3;
  MISSED_REASON_INBOUND_RATE_LIMIT = 4;
  MISSED_REASON_NO_OPERATOR = 5;
  MISSED_REASON_EXCEEDED_QUEUE = 6;
  MISSED_REASON_ABANDONED_IN_QUEUE = 7;
  MISSED_REASON_WORKFLOW = 8;
  MISSED_REASON_MANAGER_LEFT = 9;
  MISSED_REASON_NO_FALLBACK_CLIENT = 10;
}

// CallLog represents a record of a phone call in a channel.
message CallLog {
  // Channel ID where the call occurred.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string channel_id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Reason the call was missed.
  // Only present for missed calls.
  //
  // +kubebuilder:validation:Nullable
  MissedReason missed_reason = 2;

  // Direction of the call relative to the channel.
  //
  // +kubebuilder:validation:Nullable
  CallDirection direction = 3;

  // Current state of the call.
  //
  // +kubebuilder:validation:Nullable
  CallState state = 4;

  // Caller phone number or identifier.
  //
  // +kubebuilder:validation:Nullable
  string from = 5;

  // Callee phone number or identifier.
  //
  // +kubebuilder:validation:Nullable
  string to = 6;

  // Call creation timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp created_at = 7 [(buf.validate.field).required = true];

  // Call last update timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp updated_at = 8 [(buf.validate.field).required = true];

  // Timestamp when the call was answered.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp engaged_at = 9;

  // Timestamp when the call ended.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp closed_at = 10;

  // User chat ID associated with this call.
  //
  // +kubebuilder:validation:Nullable
  string user_chat_id = 11;

  // Manager IDs who participated in the call.
  //
  // +kubebuilder:validation:Nullable
  repeated string manager_ids = 12;
}

// MeetMessage represents a speech-to-text transcription message within a meet session.
message MeetMessage {
  // Unique message identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this message belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string channel_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Chat type of the parent conversation.
  //
  // +kubebuilder:validation:Required
  string chat_type = 3 [(buf.validate.field).required = true];

  // Chat ID of the parent conversation.
  //
  // +kubebuilder:validation:Required
  string chat_id = 4 [(buf.validate.field).required = true];

  // Entity type of the message author (e.g., "manager", "user").
  //
  // +kubebuilder:validation:Required
  string person_type = 5 [(buf.validate.field).required = true];

  // Entity ID of the message author.
  //
  // +kubebuilder:validation:Required
  string person_id = 6 [(buf.validate.field).required = true];

  // Structured content blocks of the message.
  //
  // +kubebuilder:validation:Nullable
  repeated coreapi.model.Block blocks = 7;

  // Plain text representation of the message.
  //
  // +kubebuilder:validation:Nullable
  string plain_text = 8;

  // Message creation timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp created_at = 9 [(buf.validate.field).required = true];

  // Message last update timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp updated_at = 10 [(buf.validate.field).required = true];
}
