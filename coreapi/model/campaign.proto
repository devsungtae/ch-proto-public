syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "coreapi/model/app_segment.proto";
import "coreapi/model/medium_type.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Lifecycle state of a campaign.
enum CampaignState {
  CAMPAIGN_STATE_UNSPECIFIED = 0;
  CAMPAIGN_STATE_DRAFT = 1;
  CAMPAIGN_STATE_ACTIVE = 2;
  CAMPAIGN_STATE_STOPPED = 3;
  CAMPAIGN_STATE_REMOVED = 4;
}

// Send timing mode for a campaign.
enum CampaignSendMode {
  CAMPAIGN_SEND_MODE_UNSPECIFIED = 0;
  CAMPAIGN_SEND_MODE_ALWAYS = 1;
  CAMPAIGN_SEND_MODE_AWAY = 2;
  CAMPAIGN_SEND_MODE_IN_OPERATION = 3;
  CAMPAIGN_SEND_MODE_CUSTOM_USING_SENDER_TIME = 4;
  CAMPAIGN_SEND_MODE_CUSTOM_USING_RECEIVER_TIME = 5;
  CAMPAIGN_SEND_MODE_CUSTOM = 6;
}

// Filter match logic for the additional event filter.
enum CampaignFilterMatch {
  CAMPAIGN_FILTER_MATCH_UNSPECIFIED = 0;
  CAMPAIGN_FILTER_MATCH_POSITIVE = 1;
  CAMPAIGN_FILTER_MATCH_NEGATIVE = 2;
}

// Base event type for holding property constants.
enum CampaignBaseEventType {
  CAMPAIGN_BASE_EVENT_TYPE_UNSPECIFIED = 0;
  CAMPAIGN_BASE_EVENT_TYPE_TRIGGER_EVENT = 1;
  CAMPAIGN_BASE_EVENT_TYPE_ADDITIONAL_FILTER = 2;
}

// Day of the week.
enum DayOfWeek {
  DAY_OF_WEEK_UNSPECIFIED = 0;
  DAY_OF_WEEK_MON = 1;
  DAY_OF_WEEK_TUE = 2;
  DAY_OF_WEEK_WED = 3;
  DAY_OF_WEEK_THU = 4;
  DAY_OF_WEEK_FRI = 5;
  DAY_OF_WEEK_SAT = 6;
  DAY_OF_WEEK_SUN = 7;
}

// TimeRange represents a time window within specific days of the week.
// From and to are expressed as minutes from midnight (0-1440).
message TimeRange {
  // Days of the week this time range applies to.
  repeated DayOfWeek day_of_weeks = 1;

  // Start time as minutes from midnight.
  //
  // +kubebuilder:validation:Minimum=0
  // +kubebuilder:validation:Maximum=1440
  int32 from = 2 [(buf.validate.field).cel = {
    id: "int32.range"
    message: "value must be between 0 and 1440"
    expression: "this >= 0 && this <= 1440"
  }];

  // End time as minutes from midnight.
  // Must be greater than from.
  //
  // +kubebuilder:validation:Minimum=0
  // +kubebuilder:validation:Maximum=1440
  int32 to = 3 [(buf.validate.field).cel = {
    id: "int32.range"
    message: "value must be between 0 and 1440"
    expression: "this >= 0 && this <= 1440"
  }];
}

// HoldingPropertyConstant enables dynamic property-based filtering
// by holding a constant value from a base event for use in event queries.
message HoldingPropertyConstant {
  // Name of the base event to extract the property value from.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string base_event_name = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Property key to extract from the base event.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string base_event_key = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Query expression for matching the held property value.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct event_query = 3;

  // Type of base event this holding property constant is associated with.
  //
  // +kubebuilder:validation:Required
  CampaignBaseEventType base_event_type = 4 [(buf.validate.field).required = true];
}

// Campaign represents a recurring automated message that is sent to users
// when they trigger a specific event.
message Campaign {
  // Unique campaign identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this campaign belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string channel_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Display name of the campaign.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  // +kubebuilder:validation:MaxLength=128
  string name = 3 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 128 characters"
      expression: "size(this) <= 128"
    },
    (buf.validate.field).required = true
  ];

  // Current lifecycle state.
  //
  // +kubebuilder:validation:Required
  CampaignState state = 4 [(buf.validate.field).required = true];

  // Delivery medium type.
  // May be unset for draft campaigns.
  //
  // +kubebuilder:validation:Nullable
  MediumType medium_type = 5;

  // Identifier of the specific medium instance.
  // Required for APP medium type.
  //
  // +kubebuilder:validation:Nullable
  string medium_id = 6;

  // User targeting query for audience filtering.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct user_query = 7;

  // App segments for user targeting.
  //
  // +kubebuilder:validation:Nullable
  repeated coreapi.model.AppSegment app_segments = 8;

  // Name of the event that triggers the campaign.
  // May be unset for draft campaigns.
  //
  // +kubebuilder:validation:Nullable
  string trigger_event_name = 9;

  // Filtering query for the trigger event.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct trigger_event_query = 10;

  // Delay between trigger event and message delivery.
  // Maximum 90 days.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Duration waiting_time = 11 [(buf.validate.field).cel = {
    id: "duration.max"
    message: "value must be at most 90 days"
    expression: "this == duration('0s') || this <= duration('7776000s')"
  }];

  // Name of the additional filter event.
  // When set, waiting_time must be non-zero.
  //
  // +kubebuilder:validation:Nullable
  string filter_event_name = 12;

  // Filtering query for the additional filter event.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct filter_event_query = 13;

  // Match logic for the additional event filter.
  //
  // +kubebuilder:validation:Nullable
  CampaignFilterMatch filter_match = 14;

  // Holding property constant for the additional event filter.
  //
  // +kubebuilder:validation:Nullable
  HoldingPropertyConstant filter_hpc = 15;

  // Conversion tracking windows keyed by feature name.
  // Defaults to 1 day for views and 7 days for clicks.
  //
  // +kubebuilder:validation:Nullable
  map<string, google.protobuf.Duration> conversion_windows = 16;

  // Name of the event tracked as a conversion goal.
  //
  // +kubebuilder:validation:Nullable
  string goal_event_name = 17;

  // Filtering query for the goal event.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct goal_event_query = 18;

  // Duration window for goal event tracking.
  // Valid range is 1 to 30 days. Defaults to 7 days.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Duration goal_event_duration = 19 [(buf.validate.field).cel = {
    id: "duration.range"
    message: "value must be between 1 and 30 days"
    expression: "this == duration('0s') || (this >= duration('86400s') && this <= duration('2592000s'))"
  }];

  // Holding property constant for the goal event.
  //
  // +kubebuilder:validation:Nullable
  HoldingPropertyConstant goal_hpc = 20;

  // Whether this campaign contains advertising content.
  //
  // +kubebuilder:validation:Nullable
  bool advertising = 21;

  // Whether to send via XMS (SMS/LMS/MMS) to offline users.
  //
  // +kubebuilder:validation:Nullable
  bool send_to_offline_xms = 22;

  // Whether to send via email to offline users.
  //
  // +kubebuilder:validation:Nullable
  bool send_to_offline_email = 23;

  // Minimum interval between consecutive sends to the same user.
  // Valid range is 0 to 30 days.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Duration cooldown = 24 [(buf.validate.field).cel = {
    id: "duration.range"
    message: "value must be between 0 and 30 days"
    expression: "this >= duration('0s') && this <= duration('2592000s')"
  }];

  // Send timing mode that determines when messages are delivered.
  // May be unset for draft campaigns.
  //
  // +kubebuilder:validation:Nullable
  CampaignSendMode send_mode = 25;

  // Channel operation ID for business hours scheduling.
  //
  // +kubebuilder:validation:Nullable
  string channel_operation_id = 26;

  // Custom time ranges for message delivery.
  // Applicable when send_mode is CUSTOM_USING_SENDER_TIME or CUSTOM_USING_RECEIVER_TIME.
  //
  // +kubebuilder:validation:Nullable
  repeated TimeRange send_time_ranges = 27;

  // Campaign start time.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp start_at = 28;

  // Scheduled campaign end timestamp.
  // Campaign automatically stops after this time.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp end_at = 29;

  // Draft snapshot of the campaign saved before activation.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct draft = 30;

  // Campaign creation timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp created_at = 31 [(buf.validate.field).required = true];

  // Campaign last update timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp updated_at = 32 [(buf.validate.field).required = true];

  // Total number of messages sent.
  //
  // +kubebuilder:validation:Nullable
  int32 sent = 33;

  // Total number of message views.
  //
  // +kubebuilder:validation:Nullable
  int32 view = 34;

  // Total number of goal conversions achieved.
  //
  // +kubebuilder:validation:Nullable
  int32 goal = 35;

  // Total number of message link clicks.
  //
  // +kubebuilder:validation:Nullable
  int32 click = 36;
}
