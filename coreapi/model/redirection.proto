syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Redirection represents a shortened URL that redirects to an original URL.
message Redirection {
  // The original URL that this redirection points to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string original_url = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // The shortened redirect URL.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string short_url = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Redirection expiration timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp expire_at = 3 [(buf.validate.field).required = true];
}
