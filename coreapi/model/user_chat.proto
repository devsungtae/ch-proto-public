syntax = "proto3";

package coreapi.model;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/model";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.model";

// Lifecycle state of a user chat.
enum UserChatState {
  USER_CHAT_STATE_UNSPECIFIED = 0;
  USER_CHAT_STATE_OPENED = 1;
  USER_CHAT_STATE_CLOSED = 2;
  USER_CHAT_STATE_SNOOZED = 3;
  USER_CHAT_STATE_QUEUED = 4;
  USER_CHAT_STATE_INITIAL = 5;
  USER_CHAT_STATE_MISSED = 6;
}

// UserChat represents a conversation between a user and the channel's team.
message UserChat {
  // Unique user chat identifier.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string id = 1 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Channel ID this user chat belongs to.
  //
  // +kubebuilder:validation:Required
  // +kubebuilder:validation:MinLength=1
  string channel_id = 2 [
    (buf.validate.field).cel = {
      id: "string.minLen"
      message: "value must be at least 1 character"
      expression: "size(this) >= 1"
    },
    (buf.validate.field).required = true
  ];

  // Current lifecycle state.
  //
  // +kubebuilder:validation:Required
  UserChatState state = 3 [(buf.validate.field).required = true];

  // ID of the user who initiated this chat.
  //
  // +kubebuilder:validation:Nullable
  string user_id = 4;

  // External reference ID of the user.
  //
  // +kubebuilder:validation:Nullable
  string xer_id = 5;

  // ID of the manager currently assigned to this chat.
  //
  // +kubebuilder:validation:Nullable
  string assignee_id = 6;

  // ID of the team this chat is routed to.
  //
  // +kubebuilder:validation:Nullable
  string team_id = 7;

  // User chat description.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxLength=1000
  string description = 8 [(buf.validate.field).cel = {
    id: "string.maxLen"
    message: "value must be no more than 1000 characters"
    expression: "size(this) <= 1000"
  }];

  // Medium type used for the initial contact.
  //
  // +kubebuilder:validation:Nullable
  string contact_medium_type = 9;

  // Reason why the chat was missed.
  // Present only when state is MISSED.
  //
  // +kubebuilder:validation:Nullable
  string missed_reason = 10;

  // ID of the active meet session associated with this chat.
  //
  // +kubebuilder:validation:Nullable
  string live_meet_id = 11;

  // Automated handling state of this chat.
  // Varies by handling type (workflow, ALF, support bot, etc.).
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct handling = 12;

  // Source information describing how this chat was created.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct source = 13;

  // Custom profile data associated with this chat.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Struct profile = 14;

  // Timestamp when the chat was first opened.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp first_opened_at = 15;

  // Timestamp when the chat was most recently opened.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp opened_at = 16;

  // Timestamp when the chat first entered the queue.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp first_queued_at = 17;

  // Timestamp when the chat most recently entered the queue.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp queued_at = 18;

  // Timestamp when the user first asked a question.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp first_asked_at = 19;

  // Timestamp when the user most recently asked a question.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp asked_at = 20;

  // Timestamp when the chat was closed.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp closed_at = 21;

  // Timestamp when a manager first replied.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp first_replied_at = 22;

  // Timestamp when a manager first replied after the chat was opened.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp first_replied_at_after_open = 23;

  // ID of the first manager assigned after the chat was opened.
  //
  // +kubebuilder:validation:Nullable
  string first_assignee_id_after_open = 24;

  // Whether the chat was resolved without reassignment.
  //
  // +kubebuilder:validation:Nullable
  bool one_stop = 25;

  // Time in milliseconds the user waited before first reply.
  //
  // +kubebuilder:validation:Nullable
  int64 waiting_time = 26;

  // Average reply time in milliseconds.
  //
  // +kubebuilder:validation:Nullable
  int64 avg_reply_time = 27;

  // Total reply time in milliseconds.
  //
  // +kubebuilder:validation:Nullable
  int64 total_reply_time = 28;

  // Total number of manager replies.
  //
  // +kubebuilder:validation:Nullable
  int32 reply_count = 29;

  // Total resolution time from open to close in milliseconds.
  //
  // +kubebuilder:validation:Nullable
  int64 resolution_time = 30;

  // Waiting time in milliseconds during business hours only.
  //
  // +kubebuilder:validation:Nullable
  int64 operation_waiting_time = 31;

  // Average reply time in milliseconds during business hours only.
  //
  // +kubebuilder:validation:Nullable
  int64 operation_avg_reply_time = 32;

  // Total reply time in milliseconds during business hours only.
  //
  // +kubebuilder:validation:Nullable
  int64 operation_total_reply_time = 33;

  // Number of manager replies during business hours only.
  //
  // +kubebuilder:validation:Nullable
  int32 operation_reply_count = 34;

  // Resolution time in milliseconds during business hours only.
  //
  // +kubebuilder:validation:Nullable
  int64 operation_resolution_time = 35;

  // ID of the most recent user-facing message.
  //
  // +kubebuilder:validation:Nullable
  string front_message_id = 36;

  // Timestamp when the user-facing content was last updated.
  //
  // +kubebuilder:validation:Nullable
  google.protobuf.Timestamp front_updated_at = 37;

  // User chat creation timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp created_at = 38 [(buf.validate.field).required = true];

  // User chat last update timestamp.
  //
  // +kubebuilder:validation:Required
  google.protobuf.Timestamp updated_at = 39 [(buf.validate.field).required = true];
}
