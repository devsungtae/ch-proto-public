syntax = "proto3";

package coreapi.service;

import "buf/validate/validate.proto";
import "coreapi/common/sort_order.proto";
import "coreapi/model/bot.proto";
import "coreapi/model/manager.proto";
import "coreapi/model/message.proto";
import "coreapi/model/message_content.proto";

option go_package = "github.com/channel-io/ch-proto-public/coreapi/go/service";
option java_multiple_files = true;
option java_package = "io.channel.api.proto.pub.coreapi.service";

// Retrieves a thread of a given message.
//
// Returns the thread root message along with its thread metadata,
// the authoring bot (if applicable), and the managers assigned to the thread.
//
// Returns 404 if the message does not exist or does not have a thread.
message GetChatThreadRequest {
  // Channel ID the chat belongs to.
  string channel_id = 1 [(buf.validate.field).required = true];

  // Chat type containing the message (e.g. "userChat", "group").
  string chat_type = 2 [(buf.validate.field).required = true];

  // Chat ID containing the message.
  string chat_id = 3 [(buf.validate.field).required = true];

  // Root message ID of the thread.
  string message_id = 4 [(buf.validate.field).required = true];
}

// Response for thread retrieval.
message GetChatThreadResult {
  // Thread root message with thread metadata.
  coreapi.model.Message message = 1;

  // Bot that authored the root message.
  //
  // +kubebuilder:validation:Nullable
  coreapi.model.Bot bot = 2;

  // Managers assigned to this thread.
  //
  // +kubebuilder:validation:Nullable
  repeated coreapi.model.Manager managers = 3;
}

// Creates a thread on a given message.
//
// Returns 404 if the message does not exist.
// Returns 422 if the message already has a thread.
message CreateChatThreadRequest {
  // Channel ID the chat belongs to.
  string channel_id = 1 [(buf.validate.field).required = true];

  // Chat type containing the message (e.g. "userChat", "group").
  string chat_type = 2 [(buf.validate.field).required = true];

  // Chat ID containing the message.
  string chat_id = 3 [(buf.validate.field).required = true];

  // Message ID to create a thread on.
  string message_id = 4 [(buf.validate.field).required = true];
}

// Response for thread creation.
message CreateChatThreadResult {
  // Thread root message with newly created thread metadata.
  coreapi.model.Message message = 1;

  // Bot that authored the root message.
  //
  // +kubebuilder:validation:Nullable
  coreapi.model.Bot bot = 2;

  // Managers assigned to this thread.
  //
  // +kubebuilder:validation:Nullable
  repeated coreapi.model.Manager managers = 3;
}

// Retrieves a list of messages in a thread.
//
// The number of messages retrieved is restricted by the limit parameter,
// and is capped to values in the closed interval [1, 500].
// Pagination is cursor-based. Pass the nextCursor value from the previous response
// as the cursor parameter to retrieve the next page.
// If the cursor parameter is left empty, the list starts with the
// most recent message in the specified sort order.
//
// Results are sorted by message creation time in the specified sort order.
// Defaults to descending order if sort_order is not specified.
message SearchChatThreadMessagesRequest {
  // Channel ID the chat belongs to.
  string channel_id = 1 [(buf.validate.field).required = true];

  // Chat type containing the message (e.g. "userChat", "group").
  string chat_type = 2 [(buf.validate.field).required = true];

  // Chat ID containing the message.
  string chat_id = 3 [(buf.validate.field).required = true];

  // Root message ID of the thread.
  string message_id = 4 [(buf.validate.field).required = true];

  // Sort order for results. Defaults to descending if unset.
  coreapi.common.SortOrder sort_order = 5;

  // Opaque pagination cursor from a previous response.
  string cursor = 6;

  // Maximum number of results to return. Defaults to 25 if unset.
  int32 limit = 7 [(buf.validate.field).cel = {
    id: "int32.between"
    message: "limit must be between 1 and 500"
    expression: "this == 0 || (this >= 1 && this <= 500)"
  }];
}

// Response for thread message list retrieval.
message SearchChatThreadMessagesResult {
  repeated coreapi.model.Message messages = 1;

  // Opaque cursor for the next page.
  // Use has_next to determine whether another page exists.
  //
  // +kubebuilder:validation:Nullable
  string next_cursor = 2;

  // Whether a next page of results exists.
  bool has_next = 3;
}

// Creates a message in a thread.
//
// If the specified bot_name does not match an existing bot in the channel,
// a new bot is automatically created with that name.
//
// Returns 404 if the thread does not exist.
message CreateChatThreadMessageRequest {
  // Channel ID the chat belongs to.
  string channel_id = 1 [(buf.validate.field).required = true];

  // Chat type containing the message (e.g. "userChat", "group").
  string chat_type = 2 [(buf.validate.field).required = true];

  // Chat ID containing the message.
  string chat_id = 3 [(buf.validate.field).required = true];

  // Root message ID of the thread.
  string message_id = 4 [(buf.validate.field).required = true];

  // Message content to send.
  coreapi.model.MessageContent content = 5 [(buf.validate.field).required = true];

  // Bot name to use as the message author.
  // If a bot with this name does not exist in the channel, one is created automatically.
  //
  // +kubebuilder:validation:Nullable
  // +kubebuilder:validation:MaxLength=30
  // +kubebuilder:validation:Pattern="^[^@#$%:/]+$"
  string bot_name = 6 [
    (buf.validate.field).cel = {
      id: "string.maxLen"
      message: "value must be no more than 30 characters"
      expression: "size(this) <= 30"
    },
    (buf.validate.field).string.pattern = "^[^@#$%:/]+$"
  ];

  // Whether to also post this message to the main chat stream.
  //
  // +kubebuilder:validation:Nullable
  bool broadcast = 7;

  // Client-generated request identifier for idempotency.
  //
  // +kubebuilder:validation:Nullable
  string request_id = 8;
}

// Response for thread message creation.
message CreateChatThreadMessageResult {
  coreapi.model.Message message = 1;
}
